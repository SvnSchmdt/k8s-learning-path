apiVersion: v1
kind: Pod
metadata:
  name: beispiel-pod
  namespace: default
  labels:
    app: beispiel
    version: v1
spec:
  containers:
  - name: nginx
    image: nginx:1.27-alpine
    ports:
    - containerPort: 80
    resources:
      requests:
        memory: "32Mi"
        cpu: "50m"
      limits:
        memory: "64Mi"
        cpu: "200m"
